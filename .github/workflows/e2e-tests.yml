name: E2E Automated Selenium Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node_id: 'node'
        node-version: '20'
        cache: 'npm'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Frontend Dependencies
      run: npm install

    - name: Start Next.js Frontend Server
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      run: |
        npm run build
        npm run start &
      # Runs in background

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements.txt

    - name: Install Google Chrome & WebDriver
      run: |
        sudo apt-get update
        sudo apt-get install -y wget curl unzip libxi6 libgconf-2-4 libnss3
        # Chrome is pre-installed on ubuntu-latest runner, webdriver-manager will download appropriate ChromeDriver.

    - name: Run E2E Selenium Tests
      env:
        APP_URL: ${{ secrets.APP_URL || 'http://localhost:3000' }}
        HEADLESS: "true"
      run: |
        # Wait for Frontend server to start responding
        sleep 5
        pytest tests/ -v

    - name: Upload Test Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-execution-report
        path: |
          test_report.xlsx
          tests/screenshots/
