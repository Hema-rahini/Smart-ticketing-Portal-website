name: E2E Automated Selenium Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Frontend Dependencies
      run: npm install

    - name: Start Next.js Frontend Server
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://cppqgkzogzxywwabtmnz.supabase.co' }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwcHFna3pvZ3p4eXd3YWJ0bW56Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMjE1MjEsImV4cCI6MjA5NjY5NzUyMX0.ac00bdM_oFw2M8BSuiN7rV0sAZOa0Cz9GDgV6nbxrns' }}
      run: |
        npm run build
        npm run start &
      # Runs in background

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements.txt

    - name: Run E2E Selenium Tests
      env:
        APP_URL: ${{ secrets.APP_URL || 'http://localhost:3000' }}
        HEADLESS: "true"
      run: |
        # Wait for Frontend server to start responding
        sleep 5
        pytest tests/ -v

    - name: Upload Test Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-execution-report
        path: |
          test_report.xlsx
          tests/screenshots/
